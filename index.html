<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TasteBite | Login</title>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="header-container">
<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
<span>TasteBite</span>
</div>
<nav>
<a href="index.html">Login</a>
</nav>
<span id="clock"></span>
</div>
</header>

<section id="login" style="max-width: 400px; margin: 100px auto; text-align: center;">
<h2>Welcome</h2>
<p>Please enter your details to continue</p>
<div class="contact-form" style="width: 100%; margin-top: 20px; text-align: left;">
    
    <label style="font-weight: bold; font-size: 14px;">Name</label>
    <input type="text" id="loginName" placeholder="Your Name">
    
    <label style="font-weight: bold; font-size: 14px; margin-top: 10px; display: block;">Email</label>
    <input type="email" id="loginEmail" placeholder="Your Email">
    
    <!-- Checkbox for Permission -->
    <label style="margin-top: 15px; display: flex; align-items: center; gap: 8px; cursor: pointer;">
        <input type="checkbox" id="loginTerms" style="width: auto; margin: 0; cursor: pointer;">
        I agree to the terms and permissions
    </label>
    
    <!-- This is where the red error text will show up -->
    <p id="loginError" style="color: red; font-size: 14px; margin-top: 10px; text-align: center; font-weight: bold; height: 15px;"></p>
    
    <button onclick="handleLogin()" class="btn-submit" style="width: 100%; margin-top: 15px;">Enter Website</button>
</div>
</section>

<footer style="position: absolute; bottom: 0; width: 100%;">© TasteBite</footer>

<!-- Custom script strictly for validating the login page -->
<script>
function handleLogin() {
    let name = document.getElementById('loginName').value.trim();
    let email = document.getElementById('loginEmail').value.trim();
    let terms = document.getElementById('loginTerms').checked;
    let errorText = document.getElementById('loginError');
    
    // Check if Name or Email is totally blank
    if(name === "" || email === ""){
        errorText.innerText = "Error: Please fill in your Name and Email!";
        return; // Stops the function so they don't get redirected
    }
    
    // Check if the permission box is ticked
    if(terms === false){
        errorText.innerText = "Error: You must check the permission box!";
        return; // Stops the function
    }
    
    // Everything is filled properly! 
    errorText.innerText = "";
    localStorage.setItem("userName", name); // Save name to memory
    window.location.href = 'main.html'; // Send them to the main website
}
</script>

<script src="script.js"></script>

</body>
</html>
