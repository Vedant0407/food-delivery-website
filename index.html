<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TasteBite | Login</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="header-container">
<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
<span>TasteBite</span>
</div>
<nav>
<a href="index.html">Login</a>
</nav>
<span id="clock"></span>
</div>
</header>

<section id="login" style="max-width: 400px; margin: 100px auto; text-align: center;">
<h2>Login</h2>
<div class="contact-form" style="width: 100%; margin-top: 20px; text-align: center;">
<input type="text" id="username" placeholder="Username" required>
<input type="password" id="password" placeholder="Password" required>
<button onclick="window.location.href='main.html'" class="btn-submit" style="width: 100%;">Login</button>
</div>
</section>

<footer style="position: absolute; bottom: 0; width: 100%;">© TasteBite</footer>

<script src="script.js"></script>

</body>
</html>
